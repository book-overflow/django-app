<!-- Inside textbook_list.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textbook List</title>
</head>
<body>
    <h1>Textbook List</h1>
    <ul>
        {% for textbook in textbooks %}
            <li><a href="{% url 'textbook_detail' textbook.id %}">{{ textbook.title }}</a></li>
        {% endfor %}
    </ul>
</body>
</html>
